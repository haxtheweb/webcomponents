  <style id="loadingstyles">
    haxcms-site-builder {
      display: block;
    }
    body[no-js] haxcms-site-builder {
      display: none !important;
    }
    #loading {
      background-color: white;
      inset: 0;
      opacity: 1;
      position: fixed;
      transition: all linear 300ms;
      -webkit-transition: all linear 300ms;
      z-index: 99999999;
    }
    #loading.loaded {
      animation: fade-out .7s ease-in-out;
      animation-fill-mode: forwards;
    }
    #loading div.messaging {
      color: rgba(255,255,255, 0.7);
      font-family: Roboto;
      left: 0px;
      margin-top: -75px;
      position: absolute;
      right: 0px;
      text-align: center;
      top: 50%;
      transform: translateY(-50%);
    }
    .progress-line,
    .progress-line:before {
      height: 8px;
      width: 100%;
      margin: auto;
    }
    .progress-line {
      background-color: rgba(0,0,0, 0.05);
      display: -webkit-flex;
      display: flex;
      width: 30vw;
    }
    .progress-line:before {
      background-color: orange;
      content: '';
      animation: running-progress 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes running-progress {
      0% {
        margin-left: 0px;
        margin-right: 100%;
      }
      50% {
        margin-left: 25%;
        margin-right: 0%;
      }
      100% {
        margin-left: 100%;
        margin-right: 0;
      }
    }
    @keyframes fade-out {
      0% {
        opacity: 1;
      }
      99% {
        opacity: 0;
      }
      100% {
        opacity: 0;
      }
    }
  </style>
  <script id="loadingscript">
    globalThis.dataLayer = globalThis.dataLayer || [];
    function gtag() {

    gtag('js', new Date());

        script.async = true;
        document.body.appendChild(script);

          haxcms = globalThis.HAXCMS.requestAvailability();

          }
        }

      function hideLoading() {
        if (loadingDismissed) {
          return;
        }
        loadingDismissed = true;
        var loadingEl = document.querySelector('#loading');
        if (!loadingEl) {
          return;
        }
        globalThis.requestAnimationFrame(function () {
          globalThis.requestAnimationFrame(function () {
            loadingEl.classList.add('loaded');
            loadingEl.setAttribute('aria-busy', 'false');
            setTimeout(function () {
              loadingEl.setAttribute('hidden', 'hidden');
            }, 120);
          });
        });
      }
      globalThis.addEventListener(
        'json-outline-schema-active-body-changed',
        function () {
          hideLoading();
        },
        { once: true }
      );
      globalThis.addEventListener(
        'haxcms-ready',
        function () {
          setTimeout(function () {
            loadAnalyticsFromManifest();
          }, 150);
          setTimeout(function () {
            hideLoading();
          }, 2500);
        },
        { once: true }
      );
    })();
